version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: phonebook_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: phonebook_user
      POSTGRES_PASSWORD: phonebook_pass
      POSTGRES_DB: phonebook_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phonebook_user -d phonebook_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: phonebook_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://phonebook_user:phonebook_pass@db:5432/phonebook_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: phonebook_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data: